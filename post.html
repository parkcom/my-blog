<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=Noto+Serif+KR:wght@400;500;700&display=swap"
    />
    <link rel="stylesheet" href="css/style.css" />
    <!-- FOUC 방지: index.html과 동일한 인라인 테마 초기화. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var theme =
            saved ||
            (matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <p class="masthead">
          <a href="index.html">
            <span class="masthead__title">My&nbsp;Blog</span>
            <span class="masthead__tagline">읽고 쓰는 자리</span>
          </a>
        </p>
        <button
          type="button"
          class="theme-toggle"
          aria-label="라이트/다크 모드 전환"
        >
          <svg
            class="theme-toggle__icon theme-toggle__icon--light"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
          </svg>
          <svg
            class="theme-toggle__icon theme-toggle__icon--dark"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"
            />
          </svg>
        </button>
      </div>
    </header>

    <main class="page">
      <a class="back-link" href="index.html">← 글 목록으로</a>

      <article>
        <header class="post-header" id="post-header" hidden>
          <h1 class="post-header__title" id="post-title"></h1>
          <p class="post-header__meta" id="post-meta"></p>
        </header>

        <div class="post-content" id="post-content">
          <p class="state-message">글을 불러오는 중…</p>
        </div>
      </article>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p>마크다운으로 쓰는 정적 블로그</p>
      </div>
    </footer>

    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/post.js"></script>
  </body>
</html>
