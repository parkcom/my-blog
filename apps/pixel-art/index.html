<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>픽셀 아트 에디터</title>
    <link rel="stylesheet" href="style.css" />
    <!-- FOUC 방지: 블로그/2048과 동일한 "theme" 키를 페인트 전 동기로 읽어 확정한다.
         (defer 모듈은 늦어 깜빡이므로 이 한 조각만 인라인 스크립트다.) -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var theme =
            saved ||
            (matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <main class="editor">
      <header class="editor-header">
        <div class="editor-title">
          <h1>픽셀 아트</h1>
          <p class="editor-subtitle">16×16 격자에 도트를 찍어 보세요</p>
        </div>
        <button
          type="button"
          class="theme-toggle"
          aria-label="라이트/다크 모드 전환"
        >
          <svg
            class="theme-toggle__icon theme-toggle__icon--light"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
          </svg>
          <svg
            class="theme-toggle__icon theme-toggle__icon--dark"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"
            />
          </svg>
        </button>
      </header>

      <!-- 도구 툴바: 펜·지우개·되돌리기·전체지우기·PNG 저장 -->
      <div class="toolbar" role="toolbar" aria-label="그리기 도구">
        <div class="tool-group" role="group" aria-label="브러시">
          <button type="button" class="btn" id="tool-pen" aria-pressed="true">
            펜
          </button>
          <button type="button" class="btn" id="tool-eraser" aria-pressed="false">
            지우개
          </button>
        </div>
        <div class="tool-group" role="group" aria-label="편집">
          <button type="button" class="btn" id="undo">되돌리기</button>
          <button type="button" class="btn" id="clear">전체 지우기</button>
          <button type="button" class="btn btn--accent" id="save">PNG 저장</button>
        </div>
      </div>

      <p class="hint">
        클릭하거나 드래그해 칠하세요. 빈 칸(체커보드)은 PNG에서 투명해집니다.
      </p>

      <!-- 화면 격자: 256개를 탭 스톱으로 만들지 않고 role=img + 라벨 1개 -->
      <div class="grid-wrap">
        <div
          class="grid"
          id="grid"
          role="img"
          aria-label="16 곱하기 16 픽셀 아트 캔버스. 위쪽 도구와 아래쪽 팔레트로 그립니다."
        ></div>
      </div>

      <!-- 색상 팔레트 -->
      <section class="palette" aria-label="색상 팔레트">
        <div class="swatches" id="swatches" role="group" aria-label="기본 색상"></div>
        <label class="custom-color">
          <span>커스텀</span>
          <input type="color" id="custom-color" value="#e43b44" />
        </label>
      </section>
    </main>

    <footer class="editor-footer">
      <a href="../../index.html" class="back-link">← 블로그로</a>
    </footer>

    <script type="module" src="editor.js"></script>
  </body>
</html>
