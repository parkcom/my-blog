<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- FOUC 방지: 페인트 전 동기로 테마를 확정한다.
         모듈 스크립트는 defer라 늦으므로 이 한 조각만 인라인 동기 스크립트로 둔다. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var theme =
            saved ||
            (matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="site-title"><a href="index.html">My Blog</a></h1>
        <button
          type="button"
          class="theme-toggle"
          aria-label="라이트/다크 모드 전환"
        >
          <span class="theme-toggle__icon--light" aria-hidden="true">🌙</span>
          <span class="theme-toggle__icon--dark" aria-hidden="true">☀️</span>
        </button>
      </div>
    </header>

    <main class="page">
      <ul class="post-list" id="post-list">
        <li class="state-message">글 목록을 불러오는 중…</li>
      </ul>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p>마크다운으로 쓰는 정적 블로그</p>
      </div>
    </footer>

    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/home.js"></script>
  </body>
</html>
